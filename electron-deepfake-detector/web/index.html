<!DOCTYPE html>
<html>
<head>
  <!-- Change base href from "/" to "./" for Electron -->
  <script>
    // Base-URL für Electron dynamisch anpassen
    (function() {
      const isElectron = window.navigator.userAgent.toLowerCase().indexOf('electron') > -1;
      if (isElectron) {
        document.write(`<base href="file://${window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1)}">`);
        console.log("Base-URL für Electron angepasst:", `file://${window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1)}`);
      } else {
        document.write('<base href="/">');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Deepfake Detector">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Deepfake Detector">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Deepfake Detector</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Additional script to check for Electron -->
  <script>
    // Add check for Electron environment
    window.isElectronApp = window.navigator.userAgent.indexOf('Electron') !== -1;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
  window.addEventListener('load', function(ev) {
    // Initialisiere Asset Manager für Electron
    if (window.assetManager) {
      window.assetManager.init();
    }
    
    // Download main.dart.js
    _flutter.loader.loadEntrypoint({
      // Für Electron KEIN Service Worker verwenden
      serviceWorker: null,
      onEntrypointLoaded: function(engineInitializer) {
        engineInitializer.initializeEngine().then(function(appRunner) {
          appRunner.runApp();
        });
      }
    });
  });
</script>
</body>
</html>
